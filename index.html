<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AFLOR | Simulador de ROI Corporativo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        :root {
            --aflor-navy: #0f1e2d;
            --aflor-green: #22c55e;
            --aflor-slate: #94a3b8;
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--aflor-navy); color: white; }
        .card-aflor { background: #152536; border: 1px solid #1a2f42; border-radius: 12px; }
        .input-aflor { background: #1a2f42; border: 1px solid #2d4458; color: white; border-radius: 8px; padding: 10px; width: 100%; }
        .btn-aflor { background: var(--aflor-green); color: #0f1e2d; font-weight: 700; transition: 0.3s; }
        .btn-aflor:hover { background: #16a34a; transform: scale(1.02); }
    </style>
</head>
<body class="min-h-screen flex flex-col md:flex-row">


    <aside class="w-full md:w-80 p-6 bg-[#0c1621] border-r border-[#1a2f42] flex flex-col gap-6">
        <div>
            <h1 class="text-xl font-bold text-white"><span class="text-green-500">AFLOR</span> ROI</h1>
            <p class="text-xs text-slate-400 uppercase tracking-widest mt-1">Configuração de Cenário</p>
        </div>


        <div class="space-y-4">
            <div>
                <label class="text-xs font-semibold text-slate-400 uppercase">Nº de Colaboradores (Acessos)</label>
                <input id="colab" type="number" value="10" class="input-aflor mt-1">
            </div>
            <div>
                <label class="text-xs font-semibold text-slate-400 uppercase">Salário Médio (R$)</label>
                <input id="salario" type="number" value="2600" class="input-aflor mt-1">
            </div>
            <div>
                <label class="text-xs font-semibold text-slate-400 uppercase">Horas Perdidas / Dia</label>
                <input id="horas" type="number" value="1.5" step="0.5" class="input-aflor mt-1">
            </div>
            <div>
                <label class="text-xs font-semibold text-slate-400 uppercase">Dias Úteis / Mês</label>
                <input id="dias" type="number" value="22" class="input-aflor mt-1">
            </div>
        </div>


        <button onclick="calcular()" class="btn-aflor w-full py-4 rounded-lg shadow-lg">
            <i class="fa-solid fa-sync-alt mr-2"></i> ATUALIZAR DASHBOARD
        </button>
        
        <button onclick="downloadPage()" class="text-xs text-slate-500 hover:text-white transition underline">
            Exportar esta simulação (.html)
        </button>
    </aside>


    <main class="flex-1 p-8 overflow-y-auto">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
            <div class="card-aflor p-6 text-center">
                <p class="text-slate-400 text-xs font-bold uppercase mb-2">Economia Mensal</p>
                <h2 id="economia" class="text-2xl font-bold text-green-500">R$ 0,00</h2>
            </div>
            <div class="card-aflor p-6 text-center">
                <p class="text-slate-400 text-xs font-bold uppercase mb-2">ROI Anual</p>
                <h2 id="roi" class="text-2xl font-bold text-blue-400">0%</h2>
            </div>
            <div class="card-aflor p-6 text-center">
                <p class="text-slate-400 text-xs font-bold uppercase mb-2">Payback</p>
                <h2 id="payback" class="text-2xl font-bold text-yellow-500">0 meses</h2>
            </div>
            <div class="card-aflor p-6 text-center">
                <p class="text-slate-400 text-xs font-bold uppercase mb-2">Ganho 12 Meses</p>
                <h2 id="anual" class="text-2xl font-bold text-white">R$ 0,00</h2>
            </div>
        </div>


        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="card-aflor p-6">
                <h3 class="text-sm font-bold text-slate-300 mb-6 uppercase tracking-wider">Impacto Financeiro (Antes vs Depois)</h3>
                <div class="h-64"><canvas id="roiChart"></canvas></div>
            </div>
            <div class="card-aflor p-8 flex flex-col justify-center border-l-4 border-green-500">
                <h3 class="text-green-500 font-bold mb-4 flex items-center gap-2">
                    <i class="fa-solid fa-chart-line"></i> DIAGNÓSTICO EXECUTIVO
                </h3>
                <div id="story" class="text-slate-200 leading-relaxed text-lg">
                    Aguardando dados...
                </div>
            </div>
        </div>
    </main>


    <script>
        let myChart;


        function calcular() {
            const n = parseFloat(document.getElementById("colab").value);
            const salario = parseFloat(document.getElementById("salario").value);
            const horas = parseFloat(document.getElementById("horas").value);
            const dias = parseFloat(document.getElementById("dias").value);


            // Custo Manual (Ineficiência)
            const custoHora = salario / 220;
            const manual = n * custoHora * horas * dias;


            // Lógica de Preços AFLOR (Baseada na sua Tabela ROI)
            let aflor = 0;
            if (n === 1) aflor = 550;
            else if (n === 2) aflor = 650;
            else if (n === 3) aflor = 750;
            else if (n === 4) aflor = 850;
            else aflor = n * 184.89; // Valor por usuário acima de 4


            const economia = manual - aflor;
            const roi = (economia / aflor) * 100;
            const payback = aflor / (economia > 0 ? economia : 1);


            // Atualização Visual
            document.getElementById("economia").innerText = "R$ " + economia.toLocaleString('pt-BR', {minimumFractionDigits: 2});
            document.getElementById("roi").innerText = roi.toFixed(0) + "%";
            document.getElementById("payback").innerText = payback.toFixed(1) + " meses";
            document.getElementById("anual").innerText = "R$ " + (economia * 12).toLocaleString('pt-BR', {minimumFractionDigits: 2});


            // Storytelling
            document.getElementById("story").innerHTML = `
                Hoje você perde <b class="text-red-400">R$ ${manual.toLocaleString('pt-BR', {maximumFractionDigits:0})}/mês</b> com processos manuais.<br><br>
                Com a AFLOR, o investimento é de apenas <b class="text-green-400">R$ ${aflor.toLocaleString('pt-BR', {maximumFractionDigits:0})}/mês</b>.<br><br>
                Isso gera um retorno de <b class="text-white">${roi.toFixed(0)}%</b>, liberando <b class="text-green-400">R$ ${(economia*12).toLocaleString('pt-BR', {maximumFractionDigits:0})}</b> de margem líquida em 1 ano.
            `;


            updateChart(manual, aflor);
        }


        function updateChart(manual, aflor) {
            const ctx = document.getElementById('roiChart').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Custo Atual', 'Investimento AFLOR'],
                    datasets: [{
                        data: [manual, aflor],
                        backgroundColor: ['#ef4444', '#22c55e'],
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true, grid: { color: '#1a2f42' } } }
                }
            });
        }


        function downloadPage() {
            const html = document.documentElement.outerHTML;
            const blob = new Blob([html], {type: 'text/html'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'AFLOR_ROI_Dashboard.html';
            a.click();
        }


        window.onload = calcular;
    </script>
</body>
</html>
